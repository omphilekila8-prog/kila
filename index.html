<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Boniwe 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffc0cb, #ff69b4);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* neon title */
h1 {
  margin-top: 40px;
  font-size: 45px;
  color: #ffffff;
  text-shadow: 0 0 10px #ff4fd8, 0 0 20px #ff4fd8;
}

/* button */
button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: #ff1493;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}

/* letter */
#letter {
  width: 80%;
  margin: 25px auto;
  font-size: 18px;
  line-height: 1.6;
  white-space: pre-wrap;
  display: none;
  min-height: 200px;
}

/* slideshow */
.slideshow {
  margin: 30px auto;
  width: 260px;
  height: 260px;
  position: relative;
}

.slideshow img {
  width: 260px;
  height: 260px;
  border-radius: 20px;
  position: absolute;
  opacity: 0;
  transition: opacity 1s;
}

.slideshow img.active {
  opacity: 1;
}

/* hearts */
.heart {
  position: absolute;
  color: white;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(100vh); opacity: 0;}
  20% {opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}

/* confetti */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>Boniwe 💖</h1>
<p>I didn’t just text you,i poured all my heart out ❤️ .</p>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<button onclick="start()">Open Surprise</button>

<div id="letter"></div>

<div class="slideshow">
  <img src="img1.jpg" class="active">
  <img src="img2.jpg">
  <img src="img3.jpg">
</div>

<script>
const text = `Baby,

.
Baby , I don’t even know how to start this without thinking about everything we’ve been through. The good days where everything felt easy and natural, and the hard ones where pride, misunderstandings, and life just made things messy between us. Somehow, even with all of that, you never stopped being someone important to me. You stayed, I stayed, and we kept finding our way back to each other even when it would’ve been easier to walk away. That alone means something real.
I appreciate you more than I usually say out loud. Not just for the sweet moments, but for the patience, the effort, and even the times you annoyed me but still somehow made me care more instead of less. You’ve been part of my growth, my mistakes, and my lessons. And weirdly enough, I wouldn’t erase any of it, because it led me to understanding you better and valuing what we have.
I love you in a way that isn’t loud or dramatic, but steady. Through ups, downs, confusion, and all the “what are we doing” moments, it’s still you I think about. And yeah, I’m not perfect at showing it, but I hope you feel it in the way I keep choosing you, even when things aren’t smooth....... I've never been so happy on my life, happiness that is brought by a lady, ik you've lowered your standards for me, which I haven't took time to appreciate that... Yk sending nudes, allowing me to do stuff while we're in public, and making me happy in every possible way, thanks for the effort, prioritising my happiness over yours and for being there for your man. ❤️ I love you Boniwe, like very very much, even my heart is crying out loud for you......i did this thing cz keo hopotse and I hate hakeo hopola o robetse, cz ha gona ntho enkae dirang. 😭 😭 By the way keo kwatetse, why o robala osa bua??? Even now I'm failing to focus cz you're in my mind... I can't study.....its ironic how you think being away from me will help me focus, but I more focused when ik that you're available and I can't you any moment and otlo araba. 😭 😭

Ik I'm young to say this, but you're the reason why I haven't broken up yet, cz you make not to think about my home situation which is very bad rn. 😭 Actually you got my life held up together..... This is a once in a while thing so enjoy. ❤️ 😁

Kao rata okwa. 💖`;

function start() {
  document.getElementById("letter").style.display = "block";
  typeWriter(text, document.getElementById("letter"), 0);
  document.getElementById("music").play();
  confettiBurst();
}

/* typewriter */
function typeWriter(text, el, i) {
  if (i < text.length) {
    el.innerHTML += text.charAt(i);
    setTimeout(() => typeWriter(text, el, i + 1), 25);
  }
}

/* slideshow */
let index = 0;
const imgs = document.querySelectorAll(".slideshow img");

setInterval(() => {
  imgs[index].classList.remove("active");
  index = (index + 1) % imgs.length;
  imgs[index].classList.add("active");
}, 2500);

/* hearts */
setInterval(() => {
  const h = document.createElement("div");
  h.classList.add("heart");
  h.innerHTML = "💖";
  h.style.left = Math.random() * 100 + "vw";
  h.style.fontSize = (10 + Math.random() * 20) + "px";
  h.style.animationDuration = (4 + Math.random() * 3) + "s";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 300);

/* confetti */
function confettiBurst() {
  for (let i = 0; i < 50; i++) {
    const c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = ["#fff", "#ff69b4", "#ff1493"][Math.floor(Math.random()*3)];
    c.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}
</script>

</body>
</html>
